<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- T-Rex head — flat origami style -->

  <!-- Back of head / neck -->
  <polygon points="14,44 22,18 32,14 28,44" fill="#9a5aab"/>

  <!-- Main head shape -->
  <polygon points="22,18 32,14 50,16 54,26 50,30 32,32 28,44 14,44" fill="#d794e2"/>

  <!-- Upper jaw -->
  <polygon points="50,16 54,26 62,24 60,18" fill="#c07dd0"/>

  <!-- Lower jaw -->
  <polygon points="50,30 62,28 62,34 54,36 42,36 32,32" fill="#b06cc0"/>

  <!-- Jaw hinge shadow -->
  <polygon points="50,16 54,26 50,30 32,32 32,28" fill="#c580d4"/>

  <!-- Teeth top -->
  <polygon points="54,26 56,29 58,26 60,29 62,26 62,24" fill="white"/>

  <!-- Teeth bottom -->
  <polygon points="50,30 52,28 54,30 56,28 58,30 60,28 62,28 62,30 50,30" fill="white"/>

  <!-- Eye socket -->
  <polygon points="36,18 44,17 44,24 36,25" fill="#e8c0f0"/>

  <!-- Eye -->
  <polygon points="38,19 43,18.5 43,23 38,23.5" fill="white"/>
  <polygon points="40,20 43,19.5 43,22.5 40,22.5" fill="#1a1a2e"/>
  <circle cx="41.5" cy="20.5" r="0.8" fill="white"/>

  <!-- Brow ridge -->
  <polygon points="34,16 46,15 44,17 36,18" fill="#b06cc0"/>

  <!-- Nostril -->
  <polygon points="59,20 61,19 61,21" fill="#a060b0"/>

  <!-- Head top fold line -->
  <line x1="32" y1="14" x2="50" y2="16" stroke="#c580d4" stroke-width="0.5"/>

  <!-- Jaw fold line -->
  <line x1="32" y1="32" x2="50" y2="30" stroke="#9a5aab" stroke-width="0.5"/>

  <!-- Neck fold -->
  <line x1="22" y1="18" x2="28" y2="44" stroke="#b06cc0" stroke-width="0.5"/>

  <!-- Origami crease on head -->
  <line x1="32" y1="14" x2="44" y2="24" stroke="#c580d4" stroke-width="0.4" opacity="0.6"/>
  <line x1="50" y1="16" x2="42" y2="36" stroke="#9a5aab" stroke-width="0.4" opacity="0.5"/>

  <!-- Small document in mouth -->
  <rect x="52" y="30" width="6" height="4" rx="0.5" fill="#EAFFC3" opacity="0.9"/>
  <line x1="53.5" y1="31.5" x2="56.5" y2="31.5" stroke="#9a5aab" stroke-width="0.5"/>
  <line x1="53.5" y1="32.8" x2="55.5" y2="32.8" stroke="#9a5aab" stroke-width="0.5"/>
</svg>
